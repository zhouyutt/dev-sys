name: miniapp-ci

on:
  pull_request:
    paths:
      - "miniapp/**"
      - ".github/workflows/miniapp-ci.yml"
  push:
    branches:
      - main
      - "chore/**"
    paths:
      - "miniapp/**"

jobs:
  miniapp-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: miniapp

      - name: Typecheck
        run: npm run typecheck
        working-directory: miniapp

      - name: Build weapp
        run: npm run build:weapp
        working-directory: miniapp
