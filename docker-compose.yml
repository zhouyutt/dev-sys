services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: dive-erp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-this-root-password}
      MYSQL_DATABASE: ${DB_NAME:-dive_erp}
      MYSQL_USER: ${DB_USER:-dive_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-this-db-password}
    ports:
      - "${MYSQL_BIND_ADDRESS:-127.0.0.1}:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - dive-erp-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
        NPM_REGISTRY: ${NPM_REGISTRY:-}
      x-bake:
        provenance: false
    container_name: dive-erp-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-dive_erp}
      DB_USER: ${DB_USER:-dive_user}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-db-password}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8082}
    ports:
      - "${BACKEND_BIND_ADDRESS:-0.0.0.0}:${BACKEND_HOST_PORT:-3000}:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - dive-erp-network

  # 前端服务（pure-admin，要求 pure-admin-tpl/dist 已提前构建）
  frontend:
    build:
      context: ./pure-admin-tpl
      dockerfile: Dockerfile
      x-bake:
        provenance: false
    container_name: dive-erp-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:${FRONTEND_HOST_PORT:-8082}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dive-erp-network

volumes:
  mysql_data:
    driver: local

networks:
  dive-erp-network:
    driver: bridge
